<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gourmet Palace Restaurant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2 class="logo">Gourmet Palace</h2>

<nav>

<a href="#home">Home</a>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>

</nav>

<button id="darkModeBtn">Dark Mode</button>

</header>


<section id="home" class="hero">

<h1>Welcome to Gourmet Palace</h1>

<p>Enjoy the best food experience</p>

<button onclick="scrollMenu()">View Menu</button>

</section>


<section id="menu" class="menu">

<h2>Our Menu</h2>

<div class="menu-buttons">

<button onclick="filterMenu('all')">All</button>
<button onclick="filterMenu('pizza')">Pizza</button>
<button onclick="filterMenu('burger')">Burger</button>
<button onclick="filterMenu('drink')">Drinks</button>

</div>

<div class="menu-items">

<div class="item pizza">
<h3>Cheese Pizza</h3>
<p>₹299</p>
<button onclick="addCart('Cheese Pizza')">Add</button>
</div>

<div class="item burger">
<h3>Veg Burger</h3>
<p>₹149</p>
<button onclick="addCart('Veg Burger')">Add</button>
</div>

<div class="item drink">
<h3>Cold Coffee</h3>
<p>₹129</p>
<button onclick="addCart('Cold Coffee')">Add</button>
</div>

<div class="item pizza">
<h3>Farmhouse Pizza</h3>
<p>₹349</p>
<button onclick="addCart('Farmhouse Pizza')">Add</button>
</div>

</div>

</section>


<section class="cart">

<h2>Your Order</h2>

<ul id="cartList"></ul>

</section>


<section id="gallery" class="gallery">

<h2>Food Gallery</h2>

<div class="gallery-grid">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">

<img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

</div>

</section>


<section id="contact" class="contact">

<h2>Book Table</h2>

<form id="bookingForm">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<input type="date" required>

<input type="time" required>

<button type="submit">Reserve Table</button>

</form>

</section>


<footer>

<p>© 2026 Gourmet Palace Restaurant</p>

</footer>

<script src="script.js"></script>

</body>

</html>
